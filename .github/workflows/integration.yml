name: Integration tests

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  integration:
    name: Integration tests (API)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Skip fork PRs — they have no access to secrets.
    if: github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      INTEGRATION_TESTS: "1"
      CHALLENGE_USERNAME: ${{ secrets.CHALLENGE_USERNAME }}
      CHALLENGE_PASSWORD: ${{ secrets.CHALLENGE_PASSWORD }}
      MFA_CODE: ${{ secrets.MFA_CODE }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Integration tests — API
        run: uv run --no-sync python -m pytest tests/integration/test_api_integration.py -v
