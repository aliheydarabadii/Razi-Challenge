name: Integration tests

on:
  pull_request:
    branches: [main, master]

jobs:
  integration:
    name: Integration tests (API)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Secrets are not available on PRs from forks — skip silently.
    if: ${{ secrets.CHALLENGE_PASSWORD != '' }}
    env:
      INTEGRATION_TESTS: "1"
      CHALLENGE_USERNAME: ${{ secrets.CHALLENGE_USERNAME }}
      CHALLENGE_PASSWORD: ${{ secrets.CHALLENGE_PASSWORD }}
      MFA_CODE: ${{ secrets.MFA_CODE }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Integration tests — API
        run: uv run --no-sync python -m pytest tests/integration/test_api_integration.py -v
