name: CI

on:
  push:
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: ruff check
        run: uv run --no-sync ruff check src/ tests/

      - name: ruff format
        run: uv run --no-sync ruff format --check src/ tests/

      - name: mypy
        run: uv run --no-sync mypy src/

  test:
    name: Test — Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}

      - name: Unit tests — pytest
        run: uv run --no-sync python -m pytest tests/unit/ -v
