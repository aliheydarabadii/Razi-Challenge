name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  ci:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --frozen --extra dev --python ${{ matrix.python-version }}

      - name: Lint — ruff check
        run: uv run ruff check src/ tests/

      - name: Format — ruff format
        run: uv run ruff format --check src/ tests/

      - name: Type check — mypy
        run: uv run mypy src/

      - name: Tests — pytest
        run: uv run python -m pytest tests/unit/ -v

  integration:
    name: Integration tests (API)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    # Only run when secrets are available (not on forks).
    if: ${{ secrets.CHALLENGE_PASSWORD != '' }}
    env:
      INTEGRATION_TESTS: "1"
      CHALLENGE_USERNAME: ${{ secrets.CHALLENGE_USERNAME }}
      CHALLENGE_PASSWORD: ${{ secrets.CHALLENGE_PASSWORD }}
      MFA_CODE: ${{ secrets.MFA_CODE }}

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen --extra dev

      - name: Integration tests — API
        run: uv run python -m pytest tests/integration/test_api_integration.py -v
